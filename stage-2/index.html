<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stage 2 - Battle</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

  <!--  BACKGROUND LAYER -->
  <div id="bg"></div>

  <h1 id="battle-arena">Battle Arena</h1>

  <button id="back-btn">← Volver</button>

  <div id="battle-layout">

    <!-- OPONENTE -->
    <section id="opponent-section">
      <h2 id="opponent-name"></h2>
      <img id="opponent-sprite" />
      <div class="hp-bar">
        <div id="opponent-hp"></div>
      </div>
    </section>

    <!-- PLAYER -->
    <section id="player-section">

      <h2 id="player-name"></h2>

      <div id="player-arena">
        <div class="arena-cell" data-pos="1"></div>
        <div class="arena-cell" data-pos="2"></div>
        <div class="arena-cell" data-pos="3"></div>

        <img id="player-sprite" />
      </div>

      <div class="hp-bar">
        <div id="player-hp"></div>
      </div>

      <!-- CONTROLES (BIEN UBICADOS) -->
      <div id="controls">
        <div id="moves-container"></div>

        <div id="cooldown-bar"></div>

        <button id="ultimate-btn" class="move-btn">Ultimate</button>
      </div>

    </section>

  </div>

  <!-- LOG -->
  <section id="log"></section>

  <!-- RESET -->
  <button id="reset-btn" style="display:none;">Battle Again</button>

  <script type="module" src="./main.js"></script>
</body>
</html>
